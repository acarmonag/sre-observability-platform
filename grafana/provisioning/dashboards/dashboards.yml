apiVersion: 1

providers:
  - name: "SRE Platform Dashboards"
    orgId: 1
    folder: "SRE Platform"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false

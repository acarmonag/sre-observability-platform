apiVersion: 1

contactPoints:
  - orgId: 1
    name: webhook-receiver
    receivers:
      - uid: webhook-receiver-uid
        type: webhook
        settings:
          url: http://localhost:9093/webhook
          httpMethod: POST
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: webhook-receiver
    group_by: ["alertname", "severity"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: webhook-receiver
        matchers:
          - "severity = critical"
        group_wait: 10s
        repeat_interval: 1h

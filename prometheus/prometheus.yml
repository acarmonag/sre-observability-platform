global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: development
    platform: sre-observability-platform

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
      # No alertmanager in this stack; alerts are managed via Grafana

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "sre-platform-app"
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "sre-platform-app"
